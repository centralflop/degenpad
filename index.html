<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DegenSad — Memecoin Launchpad on Solana</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --border: #2a2a3a;
    --green: #00ff88;
    --green-dim: rgba(0,255,136,0.12);
    --red: #ff4466;
    --red-dim: rgba(255,68,102,0.12);
    --text: #e8e8f0;
    --muted: #666688;
    --accent: #7c5cfc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 60px; border-bottom: 1px solid var(--border);
    background: var(--bg); position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--green); letter-spacing: -1px; }
  .logo span { color: var(--text); opacity: 0.5; }
  .nav-links { display: flex; gap: 24px; list-style: none; }
  .nav-links a { color: #888; text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; cursor: pointer; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }
  .nav-right { display: flex; gap: 12px; align-items: center; }

  .btn { padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; font-family: 'Space Grotesk', sans-serif; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--green); color: var(--green); }
  .btn-primary { background: var(--green); color: #000; font-weight: 700; }
  .btn-primary:hover { background: #00dd77; }
  #walletBtn { font-family: 'Space Mono', monospace; font-size: 12px; }

  .ticker-bar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 0; overflow: hidden; white-space: nowrap; }
  .ticker-inner { display: inline-flex; gap: 40px; animation: scroll 30s linear infinite; }
  @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .ticker-item { font-family: 'Space Mono', monospace; font-size: 12px; color: #888; }
  .ticker-item .sym { color: var(--text); font-weight: 700; }
  .ticker-item .up { color: var(--green); }
  .ticker-item .dn { color: var(--red); }

  .hero { text-align: center; padding: 60px 24px 40px; background: radial-gradient(ellipse at 50% 0%, rgba(124,92,252,0.08) 0%, transparent 70%); }
  .hero h1 { font-size: clamp(32px,5vw,52px); font-weight: 700; line-height: 1.1; margin-bottom: 12px; }
  .hero h1 em { font-style: normal; color: var(--green); }
  .hero p { color: #888; font-size: 16px; margin-bottom: 28px; max-width: 520px; margin-left: auto; margin-right: auto; }
  .hero-cta { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  .stats-bar { display: flex; justify-content: center; gap: 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--bg2); }
  .stat-item { flex: 1; max-width: 200px; text-align: center; padding: 18px 12px; border-right: 1px solid var(--border); }
  .stat-item:last-child { border-right: none; }
  .stat-val { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; color: var(--green); }
  .stat-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  .main { max-width: 1400px; margin: 0 auto; padding: 32px 24px; display: grid; grid-template-columns: 1fr 320px; gap: 24px; }

  .mode-tabs { display: flex; gap: 0; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 4px; width: fit-content; }
  .mode-tab { padding: 8px 20px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: #666; border: none; transition: all 0.2s; font-family: 'Space Grotesk', sans-serif; }
  .mode-tab.active { background: var(--bg3); color: var(--text); }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; background: var(--bg3); color: #888; border: 1px solid var(--border); transition: all 0.2s; font-family: 'Space Grotesk', sans-serif; }
  .filter-btn:hover, .filter-btn.active { background: var(--green-dim); color: var(--green); border-color: var(--green); }
  .search-bar { margin-left: auto; position: relative; }
  .search-bar input { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px 6px 32px; color: var(--text); font-size: 13px; width: 200px; font-family: 'Space Grotesk', sans-serif; }
  .search-bar input:focus { outline: none; border-color: var(--accent); }
  .search-bar::before { content: '⌕'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #666; font-size: 16px; }

  .token-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .token-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .token-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--green), var(--accent)); opacity: 0; transition: opacity 0.2s; }
  .token-card:hover { border-color: #3a3a4a; transform: translateY(-2px); }
  .token-card:hover::before { opacity: 1; }
  .token-card.curve-mode { border-color: rgba(124,92,252,0.3); }
  .token-card.curve-mode::before { background: linear-gradient(90deg, var(--accent), var(--red)); }

  .curve-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; background: rgba(124,92,252,0.2); color: var(--accent); margin-bottom: 8px; }
  .dot-live { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; animation: blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity: 0.2; } }

  .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .token-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--green)); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; overflow: hidden; }
  .token-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .token-name { font-weight: 700; font-size: 15px; }
  .token-symbol { font-family: 'Space Mono', monospace; font-size: 11px; color: #666; margin-top: 2px; }
  .card-badge { margin-left: auto; font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-new { background: rgba(124,92,252,0.2); color: var(--accent); }
  .badge-trending { background: rgba(0,255,136,0.15); color: var(--green); }
  .badge-graduated { background: rgba(255,136,0,0.15); color: #ff8800; }

  .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .card-stat { font-size: 12px; }
  .card-stat .label { color: #555; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-stat .val { font-family: 'Space Mono', monospace; color: var(--text); font-size: 13px; font-weight: 700; }
  .bonding-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
  .bonding-fill { height: 100%; background: linear-gradient(90deg, var(--green), #00ccff); border-radius: 2px; transition: width 0.5s ease; }
  .bonding-label { display: flex; justify-content: space-between; font-size: 10px; color: #555; }
  .curve-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
  .curve-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; }
  .curve-fill.up { background: linear-gradient(90deg, var(--accent), var(--green)); }
  .curve-fill.down { background: linear-gradient(90deg, var(--accent), var(--red)); }

  .sidebar { display: flex; flex-direction: column; gap: 16px; }
  .sidebar-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .sidebar-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .sidebar-title::before { content: ''; width: 3px; height: 12px; background: var(--green); border-radius: 2px; }
  .live-trade { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .live-trade:last-child { border-bottom: none; padding-bottom: 0; }
  .trade-type { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; }
  .type-buy { background: var(--green-dim); color: var(--green); }
  .type-sell { background: var(--red-dim); color: var(--red); }
  .trade-token { font-weight: 600; flex: 1; }
  .trade-addr { color: #555; font-family: 'Space Mono', monospace; font-size: 10px; }
  .trade-amount { font-family: 'Space Mono', monospace; font-weight: 700; margin-left: auto; }
  .trade-amount.buy { color: var(--green); }
  .trade-amount.sell { color: var(--red); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 960px; max-height: 90vh; overflow-y: auto; display: grid; grid-template-columns: 1fr 320px; }
  .modal-left { padding: 24px; border-right: 1px solid var(--border); }
  .modal-right { padding: 24px; }
  .modal-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .modal-avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--green)); display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; flex-shrink: 0; }
  .modal-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .modal-token-name { font-size: 22px; font-weight: 700; }
  .modal-token-sym { font-family: 'Space Mono', monospace; font-size: 13px; color: #666; margin-top: 2px; }
  .modal-close { margin-left: auto; background: none; border: 1px solid var(--border); color: #888; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .modal-close:hover { border-color: var(--red); color: var(--red); }

  /* CURVE BANNER */
  .curve-mode-banner { background: rgba(124,92,252,0.08); border: 1px solid rgba(124,92,252,0.3); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; font-size: 13px; }
  .curve-mode-banner .icon { font-size: 20px; }
  .curve-mode-banner .title { font-weight: 600; color: var(--accent); margin-bottom: 2px; }
  .curve-mode-banner .desc { color: #888; font-size: 12px; }
  .curve-mode-banner .timer { margin-left: auto; font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--text); min-width: 60px; text-align: right; }
  .curve-mode-banner .timer.warning { color: var(--red); animation: blink 0.5s ease-in-out infinite; }

  /* PHASE INDICATOR */
  .curve-phase { display: flex; gap: 6px; margin-bottom: 4px; }
  .phase-step { flex: 1; height: 4px; border-radius: 2px; background: var(--bg3); position: relative; overflow: hidden; }
  .phase-step.done { background: var(--green); }
  .phase-step.active { background: var(--accent); }
  .phase-step.active::after { content: ''; position: absolute; top: 0; left: -100%; right: 0; height: 100%; background: rgba(255,255,255,0.3); animation: sweep 1s ease-in-out infinite; }
  @keyframes sweep { to { left: 100%; } }
  .phase-labels { display: flex; gap: 6px; margin-bottom: 16px; }
  .phase-label { flex: 1; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: #444; text-align: center; }
  .phase-label.active { color: var(--accent); font-weight: 700; }
  .phase-label.done { color: var(--green); }

  /* PNL WIDGET */
  .pnl-widget { background: var(--bg3); border-radius: 10px; padding: 14px; margin-bottom: 14px; display: none; }
  .pnl-widget.show { display: block; }
  .pnl-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 13px; }
  .pnl-row:last-child { margin-bottom: 0; }
  .pnl-label { color: #666; }
  .pnl-val { font-family: 'Space Mono', monospace; font-weight: 700; }
  .pnl-val.profit { color: var(--green); }
  .pnl-val.loss { color: var(--red); }
  .pnl-val.neutral { color: var(--text); }

  /* CURVE ENDED */
  .curve-ended-panel { display: none; background: var(--bg3); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 16px; }
  .curve-ended-panel.show { display: block; }
  .curve-ended-panel .big-pnl { font-family: 'Space Mono', monospace; font-size: 32px; font-weight: 700; margin: 8px 0; }
  .curve-ended-panel .big-pnl.profit { color: var(--green); }
  .curve-ended-panel .big-pnl.loss { color: var(--red); }
  .curve-ended-panel p { color: #666; font-size: 12px; margin-top: 4px; }

  .chart-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .chart-tab { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--bg3); color: #666; border: 1px solid transparent; transition: all 0.2s; font-family: 'Space Mono', monospace; }
  .chart-tab.active { background: var(--green-dim); color: var(--green); border-color: var(--green); }

  #tradeChart { width: 100%; height: 280px; border-radius: 8px; overflow: hidden; background: var(--bg3); margin-bottom: 16px; }
  #tradeChart.curve-active { border: 1px solid rgba(124,92,252,0.3); }

  .token-details-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .detail-box { background: var(--bg3); border-radius: 8px; padding: 12px; }
  .detail-box .label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .detail-box .val { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; }

  .bonding-section { margin-bottom: 20px; }
  .bonding-section .title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 8px; }
  .bonding-bar-lg { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
  .bonding-fill-lg { height: 100%; background: linear-gradient(90deg, var(--green), #00ccff); border-radius: 4px; transition: width 0.8s ease; }
  .bonding-info { display: flex; justify-content: space-between; font-size: 12px; color: #666; }
  .bonding-pct { color: var(--green); font-weight: 700; font-family: 'Space Mono', monospace; }

  .modal-trades-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin: 16px 0 10px; }
  .modal-trade-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #1e1e2a; font-size: 12px; }
  .modal-trade-row:last-child { border-bottom: none; }

  .comments-section { border-top: 1px solid var(--border); padding-top: 16px; margin-top: 8px; }
  .comments-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 12px; }
  .comment-form { display: flex; gap: 8px; margin-bottom: 16px; }
  .comment-input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; font-family: 'Space Grotesk', sans-serif; }
  .comment-input:focus { outline: none; border-color: var(--accent); }
  .comment { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .comment:last-child { border-bottom: none; }
  .comment-addr { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--green); margin-bottom: 4px; }
  .comment-text { color: #ccc; }
  .comment-time { font-size: 10px; color: #555; margin-top: 4px; }

  .trade-tabs { display: flex; gap: 0; margin-bottom: 16px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .trade-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 700; transition: all 0.2s; border: none; background: transparent; color: #666; font-family: 'Space Grotesk', sans-serif; }
  .trade-tab.buy.active { background: var(--green); color: #000; }
  .trade-tab.sell.active { background: var(--red); color: #fff; }
  .trade-tab:hover:not(.active) { background: var(--bg3); }

  .wallet-balance { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-bottom: 8px; }
  .wallet-balance span:last-child { color: var(--green); font-family: 'Space Mono', monospace; }
  .amount-input-wrap { position: relative; margin-bottom: 12px; }
  .amount-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 14px 55px 14px 16px; color: var(--text); font-size: 18px; font-family: 'Space Mono', monospace; font-weight: 700; transition: border-color 0.2s; }
  .amount-input:focus { outline: none; border-color: var(--green); }
  .amount-input-unit { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #888; font-weight: 600; }
  .quick-amounts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 16px; }
  .quick-btn { padding: 8px 4px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: #888; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Space Mono', monospace; text-align: center; }
  .quick-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .trade-estimate { background: var(--bg3); border-radius: 8px; padding: 12px; margin-bottom: 14px; font-size: 12px; }
  .estimate-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .estimate-row:last-child { margin-bottom: 0; }
  .estimate-row .lbl { color: #666; }
  .estimate-row .val { font-family: 'Space Mono', monospace; color: var(--text); }
  .trade-submit { width: 100%; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; border: none; font-family: 'Space Grotesk', sans-serif; transition: all 0.2s; }
  .trade-submit.buy { background: var(--green); color: #000; }
  .trade-submit.buy:hover { background: #00dd77; }
  .trade-submit.sell { background: var(--red); color: #fff; }
  .trade-submit.sell:hover { background: #ff2255; }
  .trade-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  /* CREATE MODAL */
  .create-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
  .create-overlay.open { display: flex; }
  .create-modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 540px; padding: 28px; max-height: 90vh; overflow-y: auto; }
  .create-modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .create-modal .subtitle { color: #666; font-size: 13px; margin-bottom: 20px; }

  .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .mode-option { border: 1px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; transition: all 0.2s; background: var(--bg3); }
  .mode-option:hover { border-color: var(--accent); }
  .mode-option.selected { border-color: var(--accent); background: rgba(124,92,252,0.08); }
  .mode-option .mode-icon { font-size: 24px; margin-bottom: 6px; }
  .mode-option .mode-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .mode-option .mode-desc { font-size: 11px; color: #666; line-height: 1.4; }

  .curve-config { display: none; }
  .curve-config.show { display: block; }
  .curve-preview-wrap { background: var(--bg3); border-radius: 8px; padding: 12px; margin-bottom: 12px; height: 120px; position: relative; overflow: hidden; }
  #curvePreviewCanvas { width: 100%; height: 100%; }
  .curve-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .curve-ctrl-label { font-size: 11px; color: #666; margin-bottom: 2px; }
  .curve-ctrl-val { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text); }
  input[type="range"].curve-range { width: 100%; accent-color: var(--accent); margin-top: 4px; }

  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  .form-input, .form-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; font-family: 'Space Grotesk', sans-serif; transition: border-color 0.2s; }
  .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .image-upload { border: 2px dashed var(--border); border-radius: 8px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .image-upload:hover { border-color: var(--accent); background: rgba(124,92,252,0.05); }
